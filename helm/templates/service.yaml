apiVersion: v1
kind: Service
metadata:
  name: {{ include "pihole-exporter.fullname" . }}
  labels:
    {{- include "pihole-exporter.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: {{ .Values.exporter.port }}
      targetPort: metrics
      protocol: TCP
  selector:
    {{- include "pihole-exporter.selectorLabels" . | nindent 4 }}
